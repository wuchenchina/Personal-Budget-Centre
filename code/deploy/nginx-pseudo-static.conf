# BudgetCentre Nginx pseudo-static rules.
# Paste this into the BT/Baota "URL rewrite" panel for bc.tool.axchen.top.
#
# Assumptions:
# - Site root is /www/wwwroot/bc.tool.axchen.top
# - PHP-FPM 8.5 listens at unix:/tmp/php-cgi-85.sock
# - /api/* should be handled by backend/public/index.php
# - /backend/* and /database/* must never be web-readable

location = /api {
    include /www/server/nginx/conf/fastcgi.conf;
    fastcgi_param SCRIPT_FILENAME $document_root/backend/public/index.php;
    fastcgi_param SCRIPT_NAME /backend/public/index.php;
    fastcgi_pass unix:/tmp/php-cgi-85.sock;
}

location = /api/ {
    include /www/server/nginx/conf/fastcgi.conf;
    fastcgi_param SCRIPT_FILENAME $document_root/backend/public/index.php;
    fastcgi_param SCRIPT_NAME /backend/public/index.php;
    fastcgi_pass unix:/tmp/php-cgi-85.sock;
}

location ^~ /api/ {
    include /www/server/nginx/conf/fastcgi.conf;
    fastcgi_param SCRIPT_FILENAME $document_root/backend/public/index.php;
    fastcgi_param SCRIPT_NAME /backend/public/index.php;
    fastcgi_pass unix:/tmp/php-cgi-85.sock;
}

location = /backend {
    return 404;
}

location ^~ /backend/ {
    return 404;
}

location = /database {
    return 404;
}

location ^~ /database/ {
    return 404;
}

location ~ /\.(?!well-known) {
    return 404;
}

location / {
    try_files $uri $uri/ /index.html;
}
