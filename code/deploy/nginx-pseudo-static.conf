# BudgetCentre Nginx pseudo-static rules.
# Paste this into the BT/Baota "URL rewrite" panel for bc.tool.axchen.top.
#
# Assumptions:
# - Site root is /www/wwwroot/bc.tool.axchen.top
# - The site already has a PHP-FPM location that can execute *.php
# - /api/* should be handled by backend/public/index.php

location = /api {
    try_files $uri /backend/public/index.php$is_args$args;
}

location ^~ /api/ {
    try_files $uri /backend/public/index.php$is_args$args;
}

location ~ ^/backend/(?!public/index\.php$) {
    return 404;
}

location ^~ /database/ {
    return 404;
}

location ~ /\.(?!well-known) {
    return 404;
}

location / {
    try_files $uri $uri/ /index.html;
}
