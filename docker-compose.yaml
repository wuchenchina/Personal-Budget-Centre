services:
  web:
    build:
      context: .
      target: ${WEB_BUILD_TARGET:-web-prebuilt}
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        all_proxy: ${BUILD_ALL_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
    ports:
      - "${WEB_BIND:-127.0.0.1:18080}:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      target: ${API_BUILD_TARGET:-api-prebuilt}
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-}
        all_proxy: ${BUILD_ALL_PROXY:-}
        no_proxy: ${BUILD_NO_PROXY:-localhost,127.0.0.1,::1}
    env_file:
      - .env
    environment:
      EXPORT_STORAGE_DIR: /app/storage/exports
      EXPORT_TEMP_DIR: /app/storage/tmp/pdf
      APP_LOG_FILE: /app/storage/logs/app.log
      CHROME_BIN: /usr/bin/chromium-browser
    volumes:
      - ${APP_STORAGE_ROOT:-./storage}/exports:/app/storage/exports
      - ${APP_STORAGE_ROOT:-./storage}/tmp:/app/storage/tmp
      - ${APP_STORAGE_ROOT:-./storage}/logs:/app/storage/logs
    restart: unless-stopped
